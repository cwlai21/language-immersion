<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ Voyage — Sud de la France</title>
  <link rel="icon" type="image/png" href="icons/favicon-64.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .trip-header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .trip-progress { font-size: 14px; font-weight: 700; color: var(--primary-dark); }
    .trip-section { margin-top: 18px; }
    .trip-section h2 { font-size: 17px; margin-bottom: 4px; }
    .trip-section p.blurb { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .trip-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 4px; border-bottom: 1px solid var(--border);
    }
    .trip-item:last-child { border-bottom: none; }
    .trip-item input[type=checkbox] { width: 20px; height: 20px; margin-top: 2px; accent-color: #16a34a; flex-shrink: 0; }
    .trip-item.done .trip-title { text-decoration: line-through; color: var(--muted); }
    .trip-title { font-size: 14px; font-weight: 600; }
    .trip-title a { color: inherit; text-decoration: none; }
    .trip-title a:hover { color: var(--primary); }
    .trip-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .trip-tags { font-size: 12px; white-space: nowrap; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-flag"><span></span><span></span><span></span></span>
      <div>
        <h1>✈️ Sud de la France</h1>
        <p class="brand-sub">Lyon · Marseille · Nice · Besançon · Genève — à écouter avant de partir</p>
      </div>
    </div>
    <div class="topbar-actions">
      <a class="btn btn-ghost" href="dashboard.html">📊 Dashboard</a>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="trip-header">
        <h2>Liste d'écoute</h2>
        <span class="trip-progress" id="progress"></span>
      </div>
      <p class="blurb" style="font-size:13px;color:#6b7280;margin-top:4px">
        Coche ce que tu as écouté — la progression se synchronise entre tes appareils.
        Le temps d'écoute compte automatiquement grâce à l'extension. 🎧
      </p>
      <div id="sections"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="todo.js"></script>
</body>
</html>
