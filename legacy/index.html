<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Écoute — French Listening Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-flag"><span></span><span></span><span></span></span>
      <div>
        <h1>Écoute</h1>
        <p class="brand-sub" data-i18n="tagline">French Listening Tracker</p>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="langToggle" class="btn btn-ghost" title="Switch language">繁中</button>
      <button id="exportBtn" class="btn btn-ghost" data-i18n="export">Export CSV</button>
    </div>
  </header>

  <main class="container">

    <!-- Stats cards -->
    <section class="stats-grid">
      <div class="stat-card">
        <p class="stat-label" data-i18n="today">Today</p>
        <p class="stat-value" id="statToday">0m</p>
        <div class="goal-bar"><div class="goal-fill" id="goalFill"></div></div>
        <p class="stat-sub" id="goalText"></p>
      </div>
      <div class="stat-card">
        <p class="stat-label" data-i18n="thisWeek">This Week</p>
        <p class="stat-value" id="statWeek">0m</p>
        <p class="stat-sub" id="statWeekAvg"></p>
      </div>
      <div class="stat-card">
        <p class="stat-label" data-i18n="thisMonth">This Month</p>
        <p class="stat-value" id="statMonth">0m</p>
        <p class="stat-sub" id="statMonthAvg"></p>
      </div>
      <div class="stat-card">
        <p class="stat-label" data-i18n="streak">Day Streak</p>
        <p class="stat-value" id="statStreak">0 🔥</p>
        <p class="stat-sub" id="statTotal"></p>
      </div>
    </section>

    <div class="two-col">
      <!-- Timer -->
      <section class="card timer-card">
        <h2 data-i18n="liveTimer">Live Timer</h2>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        <div class="field-row">
          <select id="timerType" class="input">
            <option value="youtube">YouTube</option>
            <option value="podcast">Podcast</option>
          </select>
          <input type="text" id="timerTitle" class="input grow" data-i18n-ph="whatListening" placeholder="What are you listening to? (optional)">
        </div>
        <div class="timer-buttons">
          <button id="timerStart" class="btn btn-primary" data-i18n="start">▶ Start</button>
          <button id="timerPause" class="btn btn-secondary" disabled data-i18n="pause">⏸ Pause</button>
          <button id="timerStop" class="btn btn-danger" disabled data-i18n="stopSave">■ Stop &amp; Save</button>
        </div>
      </section>

      <!-- Manual entry -->
      <section class="card">
        <h2 data-i18n="manualEntry">Manual Entry</h2>
        <form id="manualForm">
          <div class="field-row">
            <input type="date" id="manualDate" class="input" required>
            <input type="number" id="manualMinutes" class="input" min="1" max="1440" data-i18n-ph="minutes" placeholder="Minutes" required>
          </div>
          <div class="field-row">
            <select id="manualType" class="input">
              <option value="youtube">YouTube</option>
              <option value="podcast">Podcast</option>
            </select>
            <input type="text" id="manualTitle" class="input grow" data-i18n-ph="titleOptional" placeholder="Title (optional)">
          </div>
          <button type="submit" class="btn btn-primary full" data-i18n="addSession">+ Add Session</button>
        </form>
        <div class="goal-setting">
          <label for="goalInput" data-i18n="dailyGoal">Daily goal (minutes)</label>
          <input type="number" id="goalInput" class="input small" min="5" max="1440" step="5">
        </div>
      </section>
    </div>

    <!-- Dashboard -->
    <section class="card">
      <div class="dash-header">
        <h2 data-i18n="dashboard">Dashboard</h2>
        <div class="tabs">
          <button class="tab active" data-view="daily" data-i18n="daily">Daily</button>
          <button class="tab" data-view="weekly" data-i18n="weekly">Weekly</button>
          <button class="tab" data-view="monthly" data-i18n="monthly">Monthly</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      <div class="chart-wrap donut-wrap">
        <h3 data-i18n="bySource">By Source</h3>
        <canvas id="typeChart"></canvas>
      </div>
    </section>

    <!-- History -->
    <section class="card">
      <h2 data-i18n="recentSessions">Recent Sessions</h2>
      <ul id="sessionList" class="session-list"></ul>
      <p id="emptyMsg" class="empty-msg" data-i18n="noSessions">No sessions yet — start the timer or add one manually. Bonne écoute ! 🎧</p>
    </section>

  </main>

  <footer class="footer">
    <p data-i18n="footer">Data is stored locally in your browser.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
